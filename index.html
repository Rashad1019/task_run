<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #070b12;
            --surface:     rgba(10, 18, 32, 0.96);
            --surface-2:   rgba(6, 12, 22, 0.7);
            --border:      rgba(255, 255, 255, 0.07);
            --border-hi:   rgba(0, 201, 167, 0.25);
            --text:        #dde4ef;
            --text-muted:  #4a5568;
            --text-dim:    #8896a8;
            --accent:      #00c9a7;
            --accent-dim:  rgba(0, 201, 167, 0.08);
            --accent-glow: rgba(0, 201, 167, 0.15);
            --p0:          #ff3b30;
            --p1:          #ff9f0a;
            --p2:          #00c9a7;
            --p3:          #7b74f0;
            --p0-bg:       rgba(255, 59, 48, 0.1);
            --p1-bg:       rgba(255, 159, 10, 0.1);
            --p2-bg:       rgba(0, 201, 167, 0.08);
            --p3-bg:       rgba(123, 116, 240, 0.1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 70% 10%, rgba(0, 201, 167, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 10% 80%, rgba(123, 116, 240, 0.05) 0%, transparent 35%),
                radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: auto, auto, 28px 28px;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* ── Header ─────────────────────────────────────────── */
        .app-header {
            width: 100%;
            max-width: 1040px;
            margin-bottom: 2rem;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
            animation: fadeDown 0.5s ease both;
        }

        .app-title {
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .app-title span {
            color: var(--text);
            opacity: 0.35;
        }

        .app-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding-bottom: 2px;
        }

        /* ── Layout ──────────────────────────────────────────── */
        .workspace {
            width: 100%;
            max-width: 1040px;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        @media (max-width: 800px) {
            .workspace { grid-template-columns: 1fr; }
        }

        /* ── Panel ───────────────────────────────────────────── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            animation: fadeUp 0.5s ease both;
        }

        .panel:nth-child(2) { animation-delay: 0.08s; }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface-2);
        }

        .panel-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .panel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.5;
        }

        .panel-dot.active {
            opacity: 1;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .panel-body {
            padding: 1.5rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* ── Textarea ────────────────────────────────────────── */
        .field-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        textarea {
            width: 100%;
            height: 220px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            line-height: 1.65;
            padding: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        textarea:focus {
            border-color: var(--border-hi);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        /* ── Button ──────────────────────────────────────────── */
        .generate-btn {
            width: 100%;
            background: var(--accent);
            color: #040810;
            border: none;
            border-radius: 6px;
            padding: 0.9rem 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }

        .generate-btn:hover:not(:disabled) {
            background: #00e0ba;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-1px);
        }

        .generate-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-arrow { font-size: 1rem; transition: transform 0.2s; }
        .generate-btn:hover:not(:disabled) .btn-arrow { transform: translateX(3px); }

        /* Spinner */
        .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(4, 8, 16, 0.3);
            border-top-color: #040810;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading .spinner { display: block; }
        .loading .btn-label,
        .loading .btn-arrow { display: none; }

        /* ── Output panel ────────────────────────────────────── */
        .output-panel .panel-body {
            min-height: 340px;
            max-height: 560px;
            overflow-y: auto;
            padding: 1.25rem;
        }

        .output-panel .panel-body::-webkit-scrollbar { width: 4px; }
        .output-panel .panel-body::-webkit-scrollbar-track { background: transparent; }
        .output-panel .panel-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* ── Empty state ─────────────────────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 280px;
            gap: 1rem;
            text-align: center;
        }

        .empty-icon {
            width: 40px;
            height: 40px;
            opacity: 0.2;
        }

        .empty-state p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* ── Task card ───────────────────────────────────────── */
        .task-card {
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 1rem 1rem 1rem 1.1rem;
            margin-bottom: 0.75rem;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.35s ease both;
            opacity: 0;
            background: rgba(0,0,0,0.15);
            transition: border-color 0.2s, background 0.2s;
        }

        .task-card:hover {
            background: rgba(0,0,0,0.25);
        }

        .task-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            border-radius: 7px 0 0 7px;
        }

        .task-card.p0::before { background: var(--p0); }
        .task-card.p1::before { background: var(--p1); }
        .task-card.p2::before { background: var(--p2); }
        .task-card.p3::before { background: var(--p3); }

        .task-card.p0 { border-color: rgba(255, 59, 48, 0.2); }
        .task-card.p1 { border-color: rgba(255, 159, 10, 0.2); }
        .task-card.p2 { border-color: rgba(0, 201, 167, 0.15); }
        .task-card.p3 { border-color: rgba(123, 116, 240, 0.2); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .task-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .task-title {
            font-weight: 600;
            font-size: 0.9rem;
            line-height: 1.45;
            flex: 1;
        }

        .priority-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .priority-badge.p0 { color: var(--p0); background: var(--p0-bg); }
        .priority-badge.p1 { color: var(--p1); background: var(--p1-bg); }
        .priority-badge.p2 { color: var(--p2); background: var(--p2-bg); }
        .priority-badge.p3 { color: var(--p3); background: var(--p3-bg); }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
        }

        .task-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 0.6rem;
        }

        .task-reasoning {
            font-size: 0.8rem;
            color: var(--text-dim);
            line-height: 1.55;
            font-style: italic;
        }

        /* ── Animations ──────────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-title">Task<span>/</span>Intel</div>
        <div class="app-meta">AI Scheduling Engine &nbsp;·&nbsp; v1.0</div>
    </header>

    <div class="workspace">

        <!-- Input Panel -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-label">Brain Dump</span>
                <span class="panel-dot active"></span>
            </div>
            <div class="panel-body">
                <div>
                    <div class="field-label">Raw task input</div>
                    <textarea id="brainDump" placeholder="E.g., I need to review Sarah's pull request for the login page, it's blocking her. Also the database is throwing 500 errors on the production reporting dashboard..."></textarea>
                </div>
                <button class="generate-btn" id="generateBtn">
                    <span class="btn-label">Generate Optimal Schedule</span>
                    <span class="btn-arrow">→</span>
                    <div class="spinner"></div>
                </button>
            </div>
        </div>

        <!-- Output Panel -->
        <div class="panel output-panel">
            <div class="panel-header">
                <span class="panel-label">Schedule Output</span>
                <span class="panel-dot" id="outputDot"></span>
            </div>
            <div class="panel-body" id="outputPanel">
                <div class="empty-state" id="emptyState">
                    <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <p>Awaiting input — schedule will appear here</p>
                </div>
                <div id="scheduleList"></div>
            </div>
        </div>

    </div>

    <script>
        const generateBtn  = document.getElementById('generateBtn');
        const brainDump    = document.getElementById('brainDump');
        const emptyState   = document.getElementById('emptyState');
        const scheduleList = document.getElementById('scheduleList');
        const outputDot    = document.getElementById('outputDot');

        generateBtn.addEventListener('click', async () => {
            const input = brainDump.value.trim();
            if (!input) return;

            generateBtn.classList.add('loading');
            generateBtn.disabled = true;
            emptyState.style.display = 'none';
            scheduleList.innerHTML = '';
            outputDot.classList.remove('active');

            try {
                const response = await fetch('/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_input: input })
                });

                if (!response.ok) {
                    const errBody = await response.json().catch(() => ({}));
                    throw new Error(errBody.error || `API returned ${response.status}`);
                }

                const data = await response.json();
                outputDot.classList.add('active');

                data.schedule.forEach((item, index) => {
                    const priority = item.priority.toLowerCase();
                    const card = document.createElement('div');
                    card.className = `task-card ${priority}`;
                    card.style.animationDelay = `${index * 0.07}s`;

                    card.innerHTML = `
                        <div class="task-row">
                            <div class="task-title">${item.task}</div>
                            <div class="priority-badge ${priority}">${item.priority}</div>
                        </div>
                        <div class="task-meta">
                            <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            ${item.estimated_minutes} min
                        </div>
                        <div class="task-divider"></div>
                        <div class="task-reasoning">${item.reasoning}</div>
                    `;
                    scheduleList.appendChild(card);
                });

            } catch (error) {
                console.error('Error:', error);
                emptyState.style.display = 'flex';
                emptyState.querySelector('p').textContent = error.message || 'Error generating schedule.';
            } finally {
                generateBtn.classList.remove('loading');
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
