<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --p0-color: #ef4444; /* Red */
            --p1-color: #f59e0b; /* Orange */
            --p2-color: #0ea5e9; /* Light Blue */
            --p3-color: #8b5cf6; /* Purple */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 1rem;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .output-panel {
            overflow-y: auto;
            max-height: 600px;
        }
        
        .output-panel::-webkit-scrollbar {
            width: 8px;
        }
        
        .output-panel::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        
        .output-panel::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .task-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            animation: slideIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .task-title {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.4;
        }

        .task-badge {
            font-size: 0.75rem;
            font-weight: 800;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            color: white;
            white-space: nowrap;
            margin-left: 1rem;
        }

        .priority-P0 { background-color: var(--p0-color); }
        .priority-P1 { background-color: var(--p1-color); }
        .priority-P2 { background-color: var(--p2-color); }
        .priority-P3 { background-color: var(--p3-color); }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
        }

        .task-reasoning {
            font-size: 0.85rem;
            color: #cbd5e1;
            font-style: italic;
            padding-left: 1rem;
            border-left: 2px solid var(--glass-border);
        }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading .spinner {
            display: block;
        }
        .loading .btn-text {
            display: none;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Input Panel -->
        <div class="glass-panel">
            <h1>AI Task Planner</h1>
            <p class="subtitle">Dump everything on your mind below. The AI will organize, prioritize, and structure your day automatically.</p>
            
            <textarea id="brainDump" placeholder="E.g., I need to review Sarah's pull request for the login page, it's blocking her. Also the database is throwing 500 errors..."></textarea>
            
            <button id="generateBtn">
                <span class="btn-text">Generate Optimal Schedule</span>
                <div class="spinner"></div>
            </button>
        </div>

        <!-- Output Panel -->
        <div class="glass-panel output-panel" id="outputPanel">
            <div class="empty-state" id="emptyState">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <p>Your structured schedule will appear here.</p>
            </div>
            
            <div id="scheduleList"></div>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const brainDump = document.getElementById('brainDump');
        const emptyState = document.getElementById('emptyState');
        const scheduleList = document.getElementById('scheduleList');

        generateBtn.addEventListener('click', async () => {
            const input = brainDump.value.trim();
            if (!input) return;

            // Loading state
            generateBtn.classList.add('loading');
            generateBtn.disabled = true;
            emptyState.style.display = 'none';
            scheduleList.innerHTML = '';

            try {
                // Call our Vercel Serverless Function
                const response = await fetch('/api/index', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_input: input })
                });

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                const data = await response.json();
                
                // Render tasks
                data.schedule.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    card.innerHTML = `
                        <div class="task-header">
                            <div class="task-title">${item.task}</div>
                            <div class="task-badge priority-${item.priority}">${item.priority}</div>
                        </div>
                        <div class="task-meta">
                            <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            ${item.estimated_minutes} minutes
                        </div>
                        <div class="task-reasoning">
                            ${item.reasoning}
                        </div>
                    `;
                    scheduleList.appendChild(card);
                });

            } catch (error) {
                console.error('Error:', error);
                alert('Failed to generate schedule. Please check the backend or your API key.');
                emptyState.style.display = 'flex';
            } finally {
                generateBtn.classList.remove('loading');
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
